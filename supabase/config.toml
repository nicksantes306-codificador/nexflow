project_id = "nexflow"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false   # local: sem confirmação de e-mail p/ agilizar dev

# Edge Functions
[functions.billing-webhook]
verify_jwt = false   # webhook da Iugu não traz JWT — autenticação por token próprio

[functions.license]
verify_jwt = false
